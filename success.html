<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent</title>
    <style>
        body {
            background-color: #0A0A23; /* Matching your dark theme */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Your Glassmorphism style */
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        a { color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully.</p>
        <a href="/">← Go Back Home</a>
    </div>
</body>
</html>
